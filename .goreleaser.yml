version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gh-pr-metrics
    binary: gh-pr-metrics
    main: .
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64, "386"]
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64

archives:
  - id: gh-pr-metrics
    formats: [binary]
    name_template: "{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto

changelog:
  disable: true
